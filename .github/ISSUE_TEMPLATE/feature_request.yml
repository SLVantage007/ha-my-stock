name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe it below. The more concrete, the better.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation you're running into.
      placeholder: "Example: I track assets in different currencies but can't see their combined value."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches that could work.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, or anything else that helps illustrate the idea.
